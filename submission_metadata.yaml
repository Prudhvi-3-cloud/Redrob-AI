ai_usage_summary: |
  OpenAI Codex was used as a coding assistant for implementation, patching,
  documentation, and release review. The ranking run itself is local and does
  not call hosted AI APIs.

methodology_summary: |
  The solution precomputes a BM25S index, normalized BGE-small candidate
  embeddings, candidate ids, and parsed candidate records. At ranking time,
  rank.py loads the official job description, retrieves a bounded candidate
  pool with sparse and dense search, fuses rankings with reciprocal-rank
  fusion, reranks the first 30 fused candidates with a local BGE reranker, and
  combines semantic score with JD evidence scoring and bounded Redrob behavior
  signals. Hard exclusions cover detected honeypots, pure research-only
  profiles, sub-3-year experience, non-India candidates unwilling to relocate,
  recent LangChain-only profiles without older ML/retrieval evidence, and
  recent no-code management profiles.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
